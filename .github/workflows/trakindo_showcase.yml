name: trakindo-showcase

on:
  push:
    paths:
      - ".github/workflows/trakindo_showcase.yml"
      - "trakindo_showcase/**"
      - "src/trakindo_dashboard/**"
      - "sql/trakindo/**"
      - "scripts/generate_trakindo_demo.py"
      - "infra/trakindo_showcase/**"
      - "pyproject.toml"
  pull_request:
    paths:
      - ".github/workflows/trakindo_showcase.yml"
      - "trakindo_showcase/**"
      - "src/trakindo_dashboard/**"
      - "sql/trakindo/**"
      - "scripts/generate_trakindo_demo.py"
      - "infra/trakindo_showcase/**"
      - "pyproject.toml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install showcase dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[showcase]" pytest
      - name: Generate demo dataset
        env:
          TRAKINDO_DATABASE_URL: sqlite:///data/trakindo_showcase/trakindo_demo.db
        run: |
          PYTHONPATH=src python scripts/generate_trakindo_demo.py
      - name: Compile Python
        run: |
          python -m compileall src/trakindo_dashboard trakindo_showcase
      - name: Run tests
        run: |
          pytest tests/test_trakindo_showcase.py

  deploy_container_app:
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Ensure resource group exists
        run: |
          az group create \
            --name "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --location "${{ vars.AZURE_LOCATION }}"
      - name: Deploy Container Apps infrastructure
        run: |
          az deployment group create \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/trakindo_showcase/main.bicep \
            --parameters \
              appName="${{ vars.TRAKINDO_APP_NAME }}" \
              containerImage="${{ vars.TRAKINDO_CONTAINER_IMAGE }}" \
              databaseUrl="${{ secrets.TRAKINDO_DATABASE_URL }}" \
              location="${{ vars.AZURE_LOCATION }}"

